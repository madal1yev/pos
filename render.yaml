services:
  # Backend API - Vercel da, Render kerak emas
  # Lekin botlar uchun alohida service kerak

  # Bot service - 24/7 ishlaydi
  - type: worker
    name: pos-bots
    runtime: node
    repo: https://github.com/madal1yev/pos
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && node standalone-bot.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: KLENT_BOT_TOKEN
        sync: false
      - key: KLENT_ADMIN_USERNAME
        value: azizvc_m
