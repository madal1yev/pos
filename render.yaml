services:
  - type: web
    name: pos-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run migrate:pg && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://pos-frontend.vercel.app"
    healthCheckPath: /api/health

databases:
  - name: pos-db
    plan: free
    databaseName: pos_system
