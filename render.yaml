services:
  - type: web
    name: pos-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-smoky-three-96.vercel.app
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
    autoDeploy: true
